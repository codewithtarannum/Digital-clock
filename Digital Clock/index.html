<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f4f6f9;
    font-family: Arial, sans-serif;
}

.container{
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 25px 40px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    font-size: 80px;
    font-weight: bold;
}

.hour,
.minute,
.seconds{
    display: flex;
    gap: 5px;
}

.hour div,
.minute div,
.seconds div{
    width: 70px;
    height: 90px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #222;
    color: white;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.dot{
    color: #222;
    font-size: 80px;
    margin: 0 5px;
}
    </style>
</head>
<body>
    <div class="container">
        <div class="hour">
            <div>1</div>
            <div>2</div>
            <div class="dot">:</div>
        </div>
        <div class="minute">
            <div>0</div>
            <div>0</div>
            <div class="dot">:</div>
        </div>
        <div class="seconds">
            <div>0</div>
            <div>0</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
